<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(59,130,246,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="150" fill="rgba(59,130,246,0.05)"/>
  <circle cx="1100" cy="530" r="200" fill="rgba(139,92,246,0.05)"/>
  
  <!-- Logo Icon -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="60" height="60" rx="12" fill="url(#accentGradient)" filter="url(#glow)"/>
    <text x="30" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">CV</text>
  </g>
  
  <!-- Brand Name -->
  <text x="160" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="white">MyCVBuddy</text>
  
  <!-- Main Title -->
  <text x="600" y="280" font-family="system-ui, -apple-syst em, sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">CV Personal Statement</text>
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#accentGradient)" text-anchor="middle" letter-spacing="-2">Examples 2026</text>
  
  <!-- Subtitle -->
  <text x="600" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">25 Proven Templates for UK Jobs • Copy & Adapt</text>
  
  <!-- Feature Tags -->
  <g transform="translate(200, 500)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
    <text x="90" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#60a5fa" text-anchor="middle">✓ Student Examples</text>
  </g>
  
  <g transform="translate(410, 500)">
    <rect x="0" y="0" width="200" height="40" rx="20" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.5)" stroke-width="1"/>
    <text x="100" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">✓ Career Change</text>
  </g>
  
  <g transform="translate(640, 500)">
    <rect x="0" y="0" width="160" height="40" rx="20" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.5)" stroke-width="1"/>
    <text x="80" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4ade80" text-anchor="middle">✓ Executive</text>
  </g>
  
  <g transform="translate(830, 500)">
    <rect x="0" y="0" width="170" height="40" rx="20" fill="rgba(234,179,8,0.2)" stroke="rgba(234,179,8,0.5)" stroke-width="1"/>
    <text x="85" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#facc15" text-anchor="middle">✓ Free to Use</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">www.mycvbuddy.com/blog/cv-personal-statement-examples</text>
</svg>
