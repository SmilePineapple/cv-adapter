name: SEO Health Monitor

on:
  # Schedule disabled - this checks scripts/seo-monitor.ts's public/sitemap.xml
  # against www.mycvbuddy.com, but production now serves version2/ (which has
  # no sitemap.xml of its own - confirmed www.mycvbuddy.com/sitemap.xml 404s),
  # so this was failing daily against a page set that hasn't been live since
  # the migration off legacy-v1. Re-enable once version2 has its own sitemap
  # generation this can check against.
  # schedule:
  #   - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor:
    name: Check SEO Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run SEO Monitor
        run: npx tsx scripts/seo-monitor.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "SEO monitor failed! Check the logs."
